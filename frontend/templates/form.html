<h1>Apply for {{ item | upper }} Insurance</h1>
<p><strong>Category:</strong> {{ data.catalog_item }}</p>
<p><strong>Name:</strong> {{ data.name }}</p>
<p><strong>Address:</strong> {{ data.address }}</p>
<p><strong>Item Age:</strong> {{ data.item_age }}</p>
<p><strong>Duration:</strong> {{ data.years_of_insurance }} Years</p>
<h2>Total Fixed Price: INR {{ data.total_price }}</h2>
<form action="/final-confirm/{{ app_id }}" method="POST">
    <button type="submit">Confirm & Buy</button>
</form>
